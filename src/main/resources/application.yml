server:
  port: ${PORT:8080}

spring:
  application:
    name: reggie
  datasource:
    druid:
      driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
      url: ${DATABASE_URL:jdbc:mysql://localhost:3306/reggie?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true}
      username: ${DATABASE_USERNAME:root}
      password: ${DATABASE_PASSWORD:123456}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG:org.apache.ibatis.logging.stdout.StdOutImpl}
  global-config:
    db-config:
      id-type: assign_id

imgpath: ${IMG_PATH:${user.dir}/img/}