services:
  - type: web
    name: reggie-takeout
    env: java
    plan: starter
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/reggle-1.0-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reggie-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: reggie-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: reggie-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: reggie-db
    databaseName: reggie
    user: reggie_user
    plan: starter